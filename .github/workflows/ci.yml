name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for affected commands

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # Required for better-sqlite3 native build
      - name: Install native build tools
        run: sudo apt-get install -y python3 make g++

      - run: pnpm install --frozen-lockfile

      # Set SHAs for nx affected commands
      - uses: nrwl/nx-set-shas@v4

      # Run affected tasks in optimal order
      - run: pnpm exec nx format:check
      - run: pnpm exec nx affected -t lint --parallel=3
      - run: pnpm exec nx affected -t test --parallel=3 --coverage
      - run: pnpm exec nx affected -t build --parallel=3

  e2e:
    runs-on: ubuntu-latest
    needs: main
    if: false # temporarily disabled — front-office-e2e failing, investigate separately
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install native build tools
        run: sudo apt-get install -y python3 make g++

      - run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached run)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: pnpm exec nx affected -t e2e --parallel=1
