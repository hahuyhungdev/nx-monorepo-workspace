name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for affected commands

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Set SHAs for nx affected commands
      - uses: nrwl/nx-set-shas@v4

      # Run affected tasks in optimal order
      - run: pnpm exec nx format:check
      - run: pnpm exec nx affected -t lint --parallel=3
      - run: pnpm exec nx affected -t test --parallel=3 --coverage
      - run: pnpm exec nx affected -t build --parallel=3

  e2e:
    runs-on: ubuntu-latest
    needs: main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: pnpm exec nx affected -t e2e --parallel=1
